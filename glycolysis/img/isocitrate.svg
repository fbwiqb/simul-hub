<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- Isocitrate - structural isomer of citrate, OH on different carbon -->
  <g transform="translate(120,60)">

    <!-- Top: COO- -->
    <text x="0" y="0" font-size="14" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>
    <line x1="0" y1="6" x2="0" y2="24" stroke="#333" stroke-width="2.5"/>

    <!-- CH with OH (isomer position) -->
    <text x="-20" y="40" font-size="14" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH</text>
    <line x1="5" y1="36" x2="25" y2="36" stroke="#333" stroke-width="2.5"/>
    <text x="40" y="40" font-size="14" fill="#1565C0" font-family="Arial" text-anchor="middle" font-weight="bold">OH</text>

    <line x1="-12" y1="46" x2="-12" y2="64" stroke="#333" stroke-width="2.5"/>

    <!-- CH with COO- branch -->
    <text x="-12" y="80" font-size="14" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH</text>
    <line x1="-28" y1="76" x2="-48" y2="76" stroke="#333" stroke-width="2.5"/>
    <text x="-72" y="80" font-size="14" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>

    <line x1="-12" y1="86" x2="-12" y2="104" stroke="#333" stroke-width="2.5"/>

    <!-- CH2 -->
    <text x="-12" y="120" font-size="14" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;</text>
    <line x1="-12" y1="126" x2="-12" y2="144" stroke="#333" stroke-width="2.5"/>

    <!-- Bottom: COO- -->
    <text x="-12" y="160" font-size="14" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">아이소시트르산 (C&#x2086;)</text>
</svg>
