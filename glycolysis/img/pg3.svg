<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- 3-PG (3-phosphoglycerate) -->
  <g transform="translate(120,35)">

    <!-- Top: COO- (carboxylate) -->
    <text x="0" y="0" font-size="15" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>

    <!-- Vertical bond -->
    <line x1="0" y1="6" x2="0" y2="40" stroke="#333" stroke-width="3"/>

    <!-- Middle: CHOH -->
    <text x="0" y="56" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CHOH</text>

    <!-- Vertical bond -->
    <line x1="0" y1="62" x2="0" y2="96" stroke="#333" stroke-width="3"/>

    <!-- Bottom: CH2O-P -->
    <text x="0" y="112" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;O</text>
    <line x1="20" y1="108" x2="38" y2="108" stroke="#333" stroke-width="2.5"/>
    <circle cx="51" cy="108" r="14" fill="#E65100"/>
    <text x="51" y="113" text-anchor="middle" font-size="14" fill="white" font-family="Arial" font-weight="bold">P</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">3-PG</text>
</svg>
