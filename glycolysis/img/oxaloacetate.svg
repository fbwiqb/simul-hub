<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- Oxaloacetate - 4-carbon with C=O on C2 -->
  <g transform="translate(120,45)">

    <!-- Top: COO- -->
    <text x="0" y="0" font-size="16" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>
    <line x1="0" y1="6" x2="0" y2="36" stroke="#333" stroke-width="3.5"/>

    <!-- C=O (ketone on C2) -->
    <text x="-18" y="52" font-size="16" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">C</text>
    <line x1="-5" y1="46" x2="20" y2="46" stroke="#333" stroke-width="2.5"/>
    <line x1="-5" y1="50" x2="20" y2="50" stroke="#333" stroke-width="2.5"/>
    <text x="35" y="54" font-size="16" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">O</text>

    <line x1="-10" y1="58" x2="-10" y2="88" stroke="#333" stroke-width="3.5"/>

    <!-- CH2 -->
    <text x="-10" y="104" font-size="16" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;</text>
    <line x1="-10" y1="110" x2="-10" y2="140" stroke="#333" stroke-width="3.5"/>

    <!-- Bottom: COO- -->
    <text x="-10" y="156" font-size="16" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">옥살아세트산 (C&#x2084;)</text>
</svg>
