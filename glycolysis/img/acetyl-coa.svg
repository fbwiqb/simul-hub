<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- Acetyl-CoA: CH3-C(=O)-S-CoA -->
  <g transform="translate(30,90)">

    <!-- CH3 group -->
    <text x="0" y="0" font-size="16" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2083;</text>

    <!-- Bond -->
    <line x1="18" y1="-4" x2="40" y2="-4" stroke="#333" stroke-width="3"/>

    <!-- C=O (carbonyl) -->
    <text x="50" y="0" font-size="16" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">C</text>
    <line x1="50" y1="-10" x2="50" y2="-28" stroke="#333" stroke-width="2.5"/>
    <line x1="54" y1="-10" x2="54" y2="-28" stroke="#333" stroke-width="2.5"/>
    <text x="52" y="-32" font-size="15" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">O</text>

    <!-- Bond to S -->
    <line x1="62" y1="-4" x2="82" y2="-4" stroke="#333" stroke-width="3"/>

    <!-- S (sulfur, yellow/orange) -->
    <text x="92" y="0" font-size="17" fill="#FF8F00" font-family="Arial" text-anchor="middle" font-weight="bold">S</text>

    <!-- Bond to CoA -->
    <line x1="106" y1="-4" x2="126" y2="-4" stroke="#333" stroke-width="3"/>

    <!-- CoA badge (purple/olive) -->
    <rect x="130" y="-20" width="55" height="32" rx="16" fill="#7B1FA2"/>
    <text x="157" y="1" text-anchor="middle" font-family="Arial" font-size="15" fill="white" font-weight="bold">CoA</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">아세틸CoA (C&#x2082;)</text>
</svg>
