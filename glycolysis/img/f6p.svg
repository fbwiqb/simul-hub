<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- Haworth projection of fructose-6-phosphate (PENTAGON) -->

  <!-- Pentagon ring (5-membered) with thick bottom edge -->
  <path d="M 115 95 L 185 95 L 200 65 L 150 40 L 100 65 Z"
        fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- Thick bottom edge -->
  <line x1="115" y1="95" x2="185" y2="95" stroke="#333" stroke-width="4.5"/>

  <!-- Oxygen in ring (top right vertex, red) -->
  <circle cx="200" cy="65" r="9" fill="#C62828"/>
  <text x="200" y="69" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">O</text>

  <!-- CH2O-P branch (C6 position, left side with phosphate) -->
  <line x1="100" y1="65" x2="70" y2="40" stroke="#333" stroke-width="2.5"/>
  <text x="65" y="30" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">CH&#x2082;O</text>
  <line x1="50" y1="25" x2="35" y2="20" stroke="#333" stroke-width="2.5"/>
  <circle cx="22" cy="16" r="14" fill="#E65100"/>
  <text x="22" y="21" text-anchor="middle" font-size="14" fill="white" font-family="Arial" font-weight="bold">P</text>

  <!-- CH2OH branch (C1 position, top extending up) -->
  <line x1="150" y1="40" x2="150" y2="15" stroke="#333" stroke-width="2.5"/>
  <text x="150" y="10" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">CH&#x2082;OH</text>

  <!-- OH groups below ring -->
  <line x1="115" y1="95" x2="115" y2="125" stroke="#333" stroke-width="2.5"/>
  <text x="115" y="142" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">OH</text>

  <line x1="150" y1="95" x2="150" y2="125" stroke="#333" stroke-width="2.5"/>
  <text x="150" y="142" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">OH</text>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">과당-6-인산 (F6P)</text>
</svg>
