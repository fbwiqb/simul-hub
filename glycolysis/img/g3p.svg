<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- G3P (glyceraldehyde-3-phosphate) - linear 3-carbon with aldehyde -->
  <g transform="translate(120,25)">

    <!-- Top: CHO (aldehyde - show C with double-bond O) -->
    <text x="-20" y="5" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">C</text>
    <line x1="-12" y1="0" x2="8" y2="0" stroke="#333" stroke-width="2.5"/>
    <line x1="-12" y1="4" x2="8" y2="4" stroke="#333" stroke-width="2.5"/>
    <text x="23" y="8" font-size="15" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">O</text>
    <text x="-35" y="8" font-size="14" fill="#333" font-family="Arial" text-anchor="middle">H</text>

    <!-- Vertical bond -->
    <line x1="-20" y1="12" x2="-20" y2="46" stroke="#333" stroke-width="3"/>

    <!-- Middle: CHOH -->
    <text x="-20" y="62" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CHOH</text>

    <!-- Vertical bond -->
    <line x1="-20" y1="68" x2="-20" y2="102" stroke="#333" stroke-width="3"/>

    <!-- Bottom: CH2O-P -->
    <text x="-20" y="118" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;O</text>
    <line x1="0" y1="114" x2="18" y2="114" stroke="#333" stroke-width="2.5"/>
    <circle cx="31" cy="114" r="14" fill="#E65100"/>
    <text x="31" y="119" text-anchor="middle" font-size="14" fill="white" font-family="Arial" font-weight="bold">P</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">G3P</text>
</svg>
