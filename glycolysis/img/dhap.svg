<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- DHAP (dihydroxyacetone phosphate) - linear 3-carbon with ketone -->
  <g transform="translate(120,35)">

    <!-- Top: CH2O-P -->
    <text x="0" y="0" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;O</text>
    <line x1="20" y1="-4" x2="38" y2="-8" stroke="#333" stroke-width="2.5"/>
    <circle cx="51" cy="-12" r="14" fill="#E65100"/>
    <text x="51" y="-7" text-anchor="middle" font-size="14" fill="white" font-family="Arial" font-weight="bold">P</text>

    <!-- Vertical bond -->
    <line x1="0" y1="6" x2="0" y2="40" stroke="#333" stroke-width="3"/>

    <!-- Middle: C=O (ketone, show double bond) -->
    <text x="-15" y="55" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">C</text>
    <line x1="0" y1="50" x2="25" y2="50" stroke="#333" stroke-width="2.5"/>
    <line x1="0" y1="54" x2="25" y2="54" stroke="#333" stroke-width="2.5"/>
    <text x="40" y="58" font-size="15" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">O</text>

    <!-- Vertical bond -->
    <line x1="-8" y1="62" x2="-8" y2="96" stroke="#333" stroke-width="3"/>

    <!-- Bottom: CH2OH -->
    <text x="-8" y="112" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;OH</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">DHAP</text>
</svg>
