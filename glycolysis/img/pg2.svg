<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- 2-PG (2-phosphoglycerate) - P on middle carbon -->
  <g transform="translate(120,35)">

    <!-- Top: COO- -->
    <text x="0" y="0" font-size="15" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>

    <!-- Vertical bond -->
    <line x1="0" y1="6" x2="0" y2="40" stroke="#333" stroke-width="3"/>

    <!-- Middle: CHO-P (P on C2) -->
    <text x="-15" y="56" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CHO</text>
    <line x1="10" y1="52" x2="28" y2="52" stroke="#333" stroke-width="2.5"/>
    <circle cx="41" cy="52" r="14" fill="#E65100"/>
    <text x="41" y="57" text-anchor="middle" font-size="14" fill="white" font-family="Arial" font-weight="bold">P</text>

    <!-- Vertical bond -->
    <line x1="-8" y1="62" x2="-8" y2="96" stroke="#333" stroke-width="3"/>

    <!-- Bottom: CH2OH -->
    <text x="-8" y="112" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;OH</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">2-PG</text>
</svg>
