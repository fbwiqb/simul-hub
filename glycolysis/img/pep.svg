<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- PEP (phosphoenolpyruvate) - enol form with C=C double bond -->
  <g transform="translate(120,35)">

    <!-- Top: COO- -->
    <text x="0" y="0" font-size="15" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>

    <!-- Vertical bond -->
    <line x1="0" y1="6" x2="0" y2="40" stroke="#333" stroke-width="3"/>

    <!-- Middle: C with O-P (show high-energy bond) -->
    <text x="-15" y="56" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">C</text>
    <line x1="2" y1="52" x2="20" y2="52" stroke="#333" stroke-width="2.5"/>
    <text x="30" y="56" font-size="15" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">O</text>
    <!-- Wavy high-energy bond -->
    <path d="M 38,52 Q 43,47 48,52 Q 53,57 58,52" fill="none" stroke="#333" stroke-width="2.5"/>
    <circle cx="71" cy="52" r="14" fill="#E65100"/>
    <text x="71" y="57" text-anchor="middle" font-size="14" fill="white" font-family="Arial" font-weight="bold">P</text>

    <!-- Double bond (C=C) -->
    <line x1="-8" y1="61" x2="-8" y2="95" stroke="#333" stroke-width="3"/>
    <line x1="-2" y1="61" x2="-2" y2="95" stroke="#333" stroke-width="3"/>

    <!-- Bottom: CH2 -->
    <text x="-5" y="111" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">PEP</text>
</svg>
