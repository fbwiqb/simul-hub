<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- Haworth projection of fructose-1,6-bisphosphate (PENTAGON with 2 phosphates) -->

  <!-- Pentagon ring -->
  <path d="M 105 115 L 175 115 L 190 85 L 140 60 L 90 85 Z"
        fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- Thick bottom edge -->
  <line x1="105" y1="115" x2="175" y2="115" stroke="#333" stroke-width="4.5"/>

  <!-- Oxygen in ring (red) -->
  <circle cx="190" cy="85" r="9" fill="#C62828"/>
  <text x="190" y="89" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">O</text>

  <!-- CH2O-P branch (C6, left with phosphate) -->
  <line x1="90" y1="85" x2="60" y2="60" stroke="#333" stroke-width="2.5"/>
  <text x="55" y="50" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">CH&#x2082;O</text>
  <line x1="40" y1="45" x2="30" y2="42" stroke="#333" stroke-width="2.5"/>
  <circle cx="17" cy="38" r="14" fill="#E65100"/>
  <text x="17" y="43" text-anchor="middle" font-size="14" fill="white" font-family="Arial" font-weight="bold">P</text>

  <!-- CH2O-P branch (C1, top with phosphate) -->
  <line x1="140" y1="60" x2="140" y2="38" stroke="#333" stroke-width="2.5"/>
  <text x="140" y="32" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">CH&#x2082;O</text>
  <line x1="140" y1="22" x2="140" y2="18" stroke="#333" stroke-width="2.5"/>
  <circle cx="140" cy="18" r="14" fill="#E65100"/>
  <text x="140" y="23" text-anchor="middle" font-size="14" fill="white" font-family="Arial" font-weight="bold">P</text>

  <!-- OH groups below ring -->
  <line x1="105" y1="115" x2="105" y2="140" stroke="#333" stroke-width="2.5"/>
  <text x="105" y="155" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">OH</text>

  <line x1="140" y1="115" x2="140" y2="140" stroke="#333" stroke-width="2.5"/>
  <text x="140" y="155" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">OH</text>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">과당-1,6-이인산 (FBP)</text>
</svg>
