<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- Malate (malic acid) - 4-carbon with OH on C2 -->
  <g transform="translate(120,45)">

    <!-- Top: COO- -->
    <text x="0" y="0" font-size="16" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>
    <line x1="0" y1="6" x2="0" y2="36" stroke="#333" stroke-width="3.5"/>

    <!-- CHOH (OH on C2) -->
    <text x="-18" y="52" font-size="16" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH</text>
    <line x1="5" y1="48" x2="25" y2="48" stroke="#333" stroke-width="2.5"/>
    <text x="40" y="52" font-size="15" fill="#1565C0" font-family="Arial" text-anchor="middle" font-weight="bold">OH</text>

    <line x1="-8" y1="58" x2="-8" y2="88" stroke="#333" stroke-width="3.5"/>

    <!-- CH2 -->
    <text x="-8" y="104" font-size="16" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;</text>
    <line x1="-8" y1="110" x2="-8" y2="140" stroke="#333" stroke-width="3.5"/>

    <!-- Bottom: COO- -->
    <text x="-8" y="156" font-size="16" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">말산 (C&#x2084;)</text>
</svg>
