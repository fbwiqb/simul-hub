<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- Citrate (citric acid) - 6-carbon with 3 carboxylates and central OH -->
  <g transform="translate(120,80)">

    <!-- Central structure with OH and 3 COO- groups -->
    <!-- Top COO- -->
    <text x="0" y="-35" font-size="14" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>
    <line x1="0" y1="-28" x2="0" y2="-10" stroke="#333" stroke-width="2.5"/>

    <!-- Central carbon with OH -->
    <text x="-20" y="0" font-size="14" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">C</text>
    <line x1="5" y1="-4" x2="25" y2="-4" stroke="#333" stroke-width="2.5"/>
    <text x="40" y="0" font-size="14" fill="#1565C0" font-family="Arial" text-anchor="middle" font-weight="bold">OH</text>

    <!-- Left branch: COO- -->
    <line x1="-28" y1="-4" x2="-48" y2="-4" stroke="#333" stroke-width="2.5"/>
    <text x="-72" y="0" font-size="14" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>

    <!-- Right branch: CH2-COO- -->
    <line x1="-12" y1="6" x2="-12" y2="24" stroke="#333" stroke-width="2.5"/>
    <text x="-12" y="40" font-size="14" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;</text>
    <line x1="-12" y1="46" x2="-12" y2="64" stroke="#333" stroke-width="2.5"/>
    <text x="-12" y="78" font-size="14" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="185" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">시트르산 (C&#x2086;)</text>
</svg>
