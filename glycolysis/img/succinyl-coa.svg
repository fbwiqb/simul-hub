<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- Succinyl-CoA - 4-carbon with CoA -->
  <g transform="translate(120,30)">

    <!-- Top: COO- -->
    <text x="0" y="0" font-size="15" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">COO&#x207B;</text>
    <line x1="0" y1="6" x2="0" y2="36" stroke="#333" stroke-width="3"/>

    <!-- CH2 -->
    <text x="0" y="52" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;</text>
    <line x1="0" y1="58" x2="0" y2="88" stroke="#333" stroke-width="3"/>

    <!-- CH2 -->
    <text x="0" y="104" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">CH&#x2082;</text>
    <line x1="0" y1="110" x2="0" y2="140" stroke="#333" stroke-width="3"/>

    <!-- C=O -->
    <text x="-15" y="156" font-size="15" fill="#333" font-family="Arial" text-anchor="middle" font-weight="bold">C</text>
    <line x1="-8" y1="149" x2="-8" y2="133" stroke="#333" stroke-width="2.5"/>
    <line x1="-4" y1="149" x2="-4" y2="133" stroke="#333" stroke-width="2.5"/>
    <text x="-6" y="128" font-size="15" fill="#C62828" font-family="Arial" text-anchor="middle" font-weight="bold">O</text>

    <!-- S -->
    <line x1="0" y1="160" x2="30" y2="160" stroke="#333" stroke-width="3"/>
    <text x="42" y="164" font-size="16" fill="#FF8F00" font-family="Arial" text-anchor="middle" font-weight="bold">S</text>

    <!-- CoA badge -->
    <line x1="54" y1="160" x2="70" y2="160" stroke="#333" stroke-width="3"/>
    <rect x="74" y="144" width="50" height="32" rx="16" fill="#7B1FA2"/>
    <text x="99" y="165" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">CoA</text>

  </g>

  <!-- Korean label -->
  <text x="120" y="195" font-family="Noto Sans KR, Arial" font-size="14" fill="#555" text-anchor="middle">숙시닐CoA (C&#x2084;)</text>
</svg>
